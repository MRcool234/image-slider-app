<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Slider App</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="mainContainer">
      <h1>Image Slider</h1>
      <div class="sliderContainer">
        <button id="prevBtn">←</button>
        <img
          class="slides"
          src="images/image-1.webp"
          alt="picture of an r34 gtr in midnight purple"
        />
        <img
          hidden
          class="slides"
          src="images/image-2.jpg"
          alt="picture of an r34 gtr in silver"
        />
        <img
          hidden
          class="slides"
          src="images/image-3.jpg"
          alt="picture of an r34 gtr in blue"
        />
        <img
          hidden
          class="slides"
          src="images/image-4.jpg"
          alt="picture of an r34 gtr in white"
        />
        <img
          hidden
          class="slides"
          src="images/image-5.webp"
          alt="picture of an r34 gtr in red"
        />
        <button id="nextBtn">→</button>
      </div>
    </div>
    <script src="index.js"></script>
  </body>
</html>
